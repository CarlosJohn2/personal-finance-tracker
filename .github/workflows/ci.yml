name: CI — Personal Finance Tracker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  testes:
    name: Testes e Cobertura
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências de desenvolvimento
        run: pip install -r requirements-dev.txt

      - name: Instalar projeto
        run: pip install -e .

      - name: Lint com flake8
        run: flake8 src/ tests/

      - name: Formatação com black
        run: black --check src/ tests/

      - name: Executar testes com cobertura
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Publicar relatório de cobertura
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          flags: unittests
          name: codecov-finance-tracker
          fail_ci_if_error: false

  lint:
    name: Qualidade de Código
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar ferramentas de linting
        run: pip install black==24.4.2 flake8==7.0.0

      - name: Verificar formatação black
        run: black --check --diff src/ tests/

      - name: Verificar flake8
        run: flake8 src/ tests/

  seguranca:
    name: Verificação de Segurança
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Auditar dependências
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969
